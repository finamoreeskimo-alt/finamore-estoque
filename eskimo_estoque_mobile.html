<title>FINAMORE – Estoque e Pedido</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a1a2e; font-size: 14px; }

  .header { background: #1a1a2e; color: #fff; padding: 12px 14px 10px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
  .header h1 { font-size: 13px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase; }
  .header h1 span { color: #e63946; }
  .header-meta { display: flex; gap: 6px; margin-top: 7px; }
  .header-meta input { flex: 1; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2); border-radius: 7px; padding: 5px 7px; color: #fff; font-size: 11px; min-width: 0; }
  .header-meta input::placeholder { color: rgba(255,255,255,.45); }

  .tabs { display: flex; overflow-x: auto; background: #fff; border-bottom: 2px solid #e2e8f0; padding: 0 6px; gap: 2px; scrollbar-width: none; position: sticky; top: 88px; z-index: 99; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 9px 11px; font-size: 11px; font-weight: 600; border: none; background: none; cursor: pointer; color: #64748b; border-bottom: 2px solid transparent; margin-bottom: -2px; white-space: nowrap; }
  .tab.active { color: #1a1a2e; border-bottom-color: #e63946; }

  .section { display: none; padding: 8px; }
  .section.active { display: block; }

  .group-card { background: #fff; border-radius: 11px; margin-bottom: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .group-header { background: #1a1a2e; color: #fff; padding: 7px 11px; font-size: 10px; font-weight: 700; letter-spacing: .9px; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .group-header .arrow { transition: transform .2s; font-size: 9px; }
  .group-header.collapsed .arrow { transform: rotate(-90deg); }
  .group-body.hidden { display: none; }

  .col-group-headers {
    display: grid;
    grid-template-columns: 1fr 26px 26px 108px 108px;
    padding: 0 6px; gap: 3px;
    background: #f1f5f9; border-bottom: 1px solid #e2e8f0;
  }
  .cgh { font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: .6px; text-align: center; padding: 4px 0 2px; }
  .cgh-est { color: #16a34a; border-bottom: 2px solid #22c55e; }
  .cgh-ped { color: #dc2626; border-bottom: 2px solid #e63946; }

  .col-sub-headers {
    display: grid;
    grid-template-columns: 1fr 26px 26px 36px 36px 36px 36px 36px 36px;
    padding: 2px 6px 3px; gap: 3px;
    background: #f8fafc; border-bottom: 1px solid #e2e8f0;
  }
  .csh { font-size: 7.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px; text-align: center; padding: 2px 0; }
  .csh:first-child { text-align: left; color: #64748b; }
  .csh-ref { color: #94a3b8; }
  .csh-est-cx { color: #16a34a; } .csh-est-avul { color: #4ade80; } .csh-est-tot { color: #15803d; font-weight: 800; }
  .csh-ped-cx { color: #dc2626; } .csh-ped-avul { color: #fb923c; } .csh-ped-tot { color: #b91c1c; font-weight: 800; }

  .product-row {
    display: grid;
    grid-template-columns: 1fr 26px 26px 36px 36px 36px 36px 36px 36px;
    align-items: center; padding: 6px 6px; border-bottom: 1px solid #f1f5f9; gap: 3px;
  }
  .product-row:last-child { border-bottom: none; }
  .product-name { font-size: 10px; font-weight: 500; line-height: 1.3; }
  .product-ref  { font-size: 9px; color: #94a3b8; text-align: center; font-weight: 600; }

  .qty-input {
    width: 100%; border: 1.5px solid #e2e8f0; border-radius: 6px;
    padding: 5px 1px; text-align: center; font-size: 11px; font-weight: 700;
    background: #f8fafc; -moz-appearance: textfield;
  }
  .qty-input::-webkit-inner-spin-button, .qty-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .qty-input:focus { outline: none; background: #fff; }
  .qty-input.est-cx.active   { background: #f0fdf4; border-color: #22c55e; color: #15803d; }
  .qty-input.est-avul.active { background: #dcfce7; border-color: #86efac; color: #15803d; }
  .qty-input.ped-cx.active   { background: #fff1f2; border-color: #fca5a5; color: #b91c1c; }
  .qty-input.ped-avul.active { background: #fff7ed; border-color: #fdba74; color: #c2410c; }

  .tot-field {
    width: 100%; border: 2px solid #e2e8f0; border-radius: 6px;
    padding: 5px 1px; text-align: center; font-size: 11px; font-weight: 800;
    background: #f1f5f9; color: #94a3b8; pointer-events: none;
  }
  .tot-field.est-active { background: #bbf7d0; border-color: #22c55e; color: #14532d; }
  .tot-field.ped-active { background: #fecaca; border-color: #e63946; color: #7f1d1d; }

  .summary-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a2e; color: #fff; padding: 9px 14px; display: flex; justify-content: space-between; align-items: center; z-index: 200; }
  .summary-bar span { font-size: 10px; color: rgba(255,255,255,.55); }
  .summary-bar strong { font-size: 13px; }
  .btn-resumo { background: #e63946; color: #fff; border: none; border-radius: 8px; padding: 8px 15px; font-size: 12px; font-weight: 700; cursor: pointer; }
  .spacer { height: 55px; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 300; }
  .modal-overlay.open { display: flex; align-items: flex-end; }
  .modal { background: #fff; border-radius: 18px 18px 0 0; width: 100%; max-height: 88vh; overflow-y: auto; padding: 18px 14px 30px; }
  .modal-title { font-size: 15px; font-weight: 800; margin-bottom: 2px; }
  .modal-sub   { font-size: 11px; color: #64748b; margin-bottom: 6px; }
  .modal-warn  { font-size: 10px; color: #dc2626; background: #fff1f2; border-radius: 6px; padding: 6px 10px; margin-bottom: 12px; }

  .modal-tbl { width: 100%; border-collapse: collapse; font-size: 10.5px; margin-bottom: 16px; }
  .modal-tbl th { font-size: 8.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px; padding: 5px 3px; border-bottom: 2px solid #e2e8f0; text-align: center; }
  .modal-tbl th:first-child { text-align: left; }
  .modal-tbl td { padding: 6px 3px; border-bottom: 1px solid #f1f5f9; text-align: center; vertical-align: middle; }
  .modal-tbl td:first-child { text-align: left; font-weight: 500; }
  .modal-tbl tr:last-child td { border-bottom: none; }
  .th-est { color: #16a34a; } .th-ped { color: #dc2626; }
  .td-est { color: #15803d; font-weight: 700; } .td-ped { color: #b91c1c; font-weight: 700; }
  .td-tot-est { color: #14532d; font-weight: 800; background: #dcfce7; border-radius: 4px; padding: 4px 3px; }
  .td-tot-ped { color: #7f1d1d; font-weight: 800; background: #fecaca; border-radius: 4px; padding: 4px 3px; }

  .btn-row { display: flex; gap: 8px; margin-top: 4px; }
  .btn-download { flex: 1; background: #1a1a2e; color: #fff; border: none; border-radius: 9px; padding: 12px; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .btn-fechar   { flex: 1; background: #f1f5f9; color: #1a1a2e; border: none; border-radius: 9px; padding: 12px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .empty-msg { text-align: center; color: #94a3b8; padding: 24px; font-size: 13px; }

  .legend { display: flex; gap: 8px; padding: 6px 6px 2px; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 3px; font-size: 9px; color: #64748b; }
  .leg-sq { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
</style>

var values = {};
function makeKey(tab, group, idx) { return tab + '__' + group + '__' + idx; }
function updateCount() { document.getElementById('filled-count').textContent = Object.keys(values).length; }
function updateTitle() {}

function calcTotal(cxVal, avulVal, qtdCx) {
  var cx   = parseInt(cxVal,   10) || 0;
  var avul = parseInt(avulVal, 10) || 0;
  var mult = (qtdCx && !isNaN(parseInt(qtdCx, 10))) ? parseInt(qtdCx, 10) : 1;
  var total = cx * mult + avul;
  return total > 0 ? total : 0;
}

function fmtDate(d) {
  if (!d) return '';
  var p = d.split('-');
  return p[2] + '/' + p[1] + '/' + p[0];
}

function buildUI() {
  var tabsEl = document.getElementById('tabs');
  var sectionsEl = document.getElementById('sections');

  Object.keys(catalog).forEach(function(tab, ti) {
    var btn = document.createElement('button');
    btn.className = 'tab' + (ti === 0 ? ' active' : '');
    btn.textContent = tab;
    btn.onclick = (function(t){ return function(){ switchTab(t); }; })(tab);
    tabsEl.appendChild(btn);

    var sec = document.createElement('div');
    sec.className = 'section' + (ti === 0 ? ' active' : '');
    sec.id = 'sec-' + tab;

    var leg = document.createElement('div');
    leg.className = 'legend';
    leg.innerHTML =

      '<span class="leg"><span class="leg-sq" style="background:#fdba74"></span>+unit avulso</span>' +
      '<span class="leg"><span class="leg-sq" style="background:#fecaca;border:1.5px solid #e63946"></span><b>total ped.</b></span>';
    sec.appendChild(leg);

    Object.entries(catalog[tab]).forEach(function(entry) {
      var group = entry[0], products = entry[1];
      var card = document.createElement('div');
      card.className = 'group-card';

      var gh = document.createElement('div');
      gh.className = 'group-header';
      gh.innerHTML = '<span>' + group + '</span><span class="arrow">▼</span>';

      var gb = document.createElement('div');
      gb.className = 'group-body';
      gh.onclick = function() { gh.classList.toggle('collapsed'); gb.classList.toggle('hidden'); };

      var cgh = document.createElement('div');
      cgh.className = 'col-group-headers';
      cgh.innerHTML =
        '<span class="cgh"></span><span class="cgh"></span><span class="cgh"></span>' +
        '<span class="cgh cgh-est">ESTOQUE</span><span class="cgh cgh-ped">PEDIDO</span>';
      gb.appendChild(cgh);

      var csh = document.createElement('div');
      csh.className = 'col-sub-headers';
      csh.innerHTML =
        '<span class="csh">Produto</span><span class="csh csh-ref">CX</span><span class="csh csh-ref">Eng.</span>' +
        '<span class="csh csh-est-cx">cx</span><span class="csh csh-est-avul">+unit</span><span class="csh csh-est-tot">total</span>' +
        '<span class="csh csh-ped-cx">cx</span><span class="csh csh-ped-avul">+unit</span><span class="csh csh-ped-tot">total</span>';
      gb.appendChild(csh);

      products.forEach(function(item, idx) {
        var name = item[0], qtdCx = item[1], eng = item[2];
        var key = makeKey(tab, group, idx);
        var row = document.createElement('div');
        row.className = 'product-row';

        function mkInput(cls) {
          var inp = document.createElement('input');
          inp.type = 'number'; inp.inputMode = 'numeric';
          inp.className = 'qty-input ' + cls; inp.placeholder = '0';
          return inp;
        }
        function mkTot() {
          var d = document.createElement('div');
          d.className = 'tot-field'; d.textContent = '-';
          return d;
        }

        var inEstCx = mkInput('est-cx'), inEstAvul = mkInput('est-avul'), totEst = mkTot();
        var inPedCx = mkInput('ped-cx'), inPedAvul = mkInput('ped-avul'), totPed = mkTot();

        function refresh() {
          var estAny = inEstCx.value !== '' || inEstAvul.value !== '';
          var pedAny = inPedCx.value !== '' || inPedAvul.value !== '';
          var estT = calcTotal(inEstCx.value, inEstAvul.value, qtdCx);
          var pedT = calcTotal(inPedCx.value, inPedAvul.value, qtdCx);

          totEst.textContent = estAny ? estT : '-';
          totEst.classList.toggle('est-active', estAny);
          totPed.textContent = pedAny ? pedT : '-';
          totPed.classList.toggle('ped-active', pedAny);

          inEstCx.classList.toggle('active',   inEstCx.value   !== '');
          inEstAvul.classList.toggle('active', inEstAvul.value !== '');
          inPedCx.classList.toggle('active',   inPedCx.value   !== '');
          inPedAvul.classList.toggle('active', inPedAvul.value !== '');

          if (estAny || pedAny) {
            values[key] = {
              tab: tab, group: group, name: name, qtdCx: qtdCx, eng: eng,
              estCx: inEstCx.value, estAvul: inEstAvul.value, estTot: estAny ? estT : '',
              pedCx: inPedCx.value, pedAvul: inPedAvul.value, pedTot: pedAny ? pedT : ''
            };
          } else { delete values[key]; }
          updateCount();
        }

        inEstCx.addEventListener('input', refresh); inEstAvul.addEventListener('input', refresh);
        inPedCx.addEventListener('input', refresh); inPedAvul.addEventListener('input', refresh);

        row.innerHTML =
          '<span class="product-name">' + name + '</span>' +
          '<span class="product-ref">'  + (qtdCx || '-') + '</span>' +
          '<span class="product-ref">'  + (eng   || '-') + '</span>';
        row.appendChild(inEstCx); row.appendChild(inEstAvul); row.appendChild(totEst);
        row.appendChild(inPedCx); row.appendChild(inPedAvul); row.appendChild(totPed);
        gb.appendChild(row);
      });

      card.appendChild(gh); card.appendChild(gb); sec.appendChild(card);
    });

    sectionsEl.appendChild(sec);
  });

  document.getElementById('data').value = new Date().toISOString().split('T')[0];

  // Aba NOVOS PRODUTOS
  var btnNovos = document.createElement('button');
  btnNovos.className = 'tab';
  btnNovos.textContent = '+ NOVOS';
  btnNovos.style.color = '#e63946';
  btnNovos.onclick = function(){ switchTab('__NOVOS__'); };
  tabsEl.appendChild(btnNovos);

  var secNovos = document.createElement('div');
  secNovos.className = 'section';
  secNovos.id = 'sec-__NOVOS__';

  var novosTitulo = document.createElement('div');
  novosTitulo.style.cssText = 'background:#1a1a2e;color:#fff;border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:12px;line-height:1.5';
  novosTitulo.innerHTML = '<b style="color:#e63946">+ Novos Produtos</b><br><span style="color:rgba(255,255,255,.6);font-size:10px">Itens fora do catálogo. Preencha nome, marca e quantidade. Quando cadastrado, será removido daqui.</span>';
  secNovos.appendChild(novosTitulo);

  var novosCard = document.createElement('div');
  novosCard.className = 'group-card';
  novosCard.id = 'novos-card';

  var novosBody = document.createElement('div');
  novosBody.className = 'group-body';
  novosBody.id = 'novos-body';

  // Cabeçalho das colunas de novos
  var novosColH = document.createElement('div');
  novosColH.style.cssText = 'display:grid;grid-template-columns:1fr 100px 60px 60px 28px;gap:4px;padding:4px 8px 3px;background:#f8fafc;border-bottom:1px solid #e2e8f0;font-size:8px;font-weight:700;text-transform:uppercase;color:#94a3b8;letter-spacing:.4px;';
  novosColH.innerHTML = '<span>Nome do produto</span><span style="text-align:center">Marca/Grupo</span><span style="text-align:center;color:#16a34a">Estoque</span><span style="text-align:center;color:#e63946">Pedido</span><span></span>';
  novosBody.appendChild(novosColH);

  novosCard.appendChild(novosBody);
  secNovos.appendChild(novosCard);

  // Botão adicionar linha
  var btnAdd = document.createElement('button');
  btnAdd.style.cssText = 'width:100%;background:#fff;border:2px dashed #e63946;color:#e63946;border-radius:10px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;margin-top:6px;';
  btnAdd.textContent = '+ Adicionar produto';
  btnAdd.onclick = function(){ adicionarLinhaNovo(); };
  secNovos.appendChild(btnAdd);

  sectionsEl.appendChild(secNovos);

  // Inicia com 1 linha vazia
  adicionarLinhaNovo();
}

var novosIdx = 0;
function adicionarLinhaNovo() {
  var body = document.getElementById('novos-body');
  var idx = novosIdx++;
  var key = '__NOVOS__' + idx;

  var row = document.createElement('div');
  row.style.cssText = 'display:grid;grid-template-columns:1fr 100px 60px 60px 28px;gap:4px;padding:6px 8px;border-bottom:1px solid #f1f5f9;align-items:center;';
  row.id = 'novo-row-' + idx;

  var inNome = document.createElement('input');
  inNome.type = 'text'; inNome.placeholder = 'Nome do produto';
  inNome.style.cssText = 'width:100%;border:1.5px solid #e2e8f0;border-radius:6px;padding:5px 6px;font-size:10px;font-weight:500;background:#f8fafc;';

  var inMarca = document.createElement('input');
  inMarca.type = 'text'; inMarca.placeholder = 'Marca';
  inMarca.style.cssText = 'width:100%;border:1.5px solid #e2e8f0;border-radius:6px;padding:5px 4px;font-size:10px;text-align:center;background:#f8fafc;';

  var inEst = document.createElement('input');
  inEst.type = 'number'; inEst.inputMode = 'numeric'; inEst.placeholder = '0';
  inEst.style.cssText = 'width:100%;border:1.5px solid #e2e8f0;border-radius:6px;padding:5px 2px;font-size:11px;font-weight:700;text-align:center;background:#f8fafc;-moz-appearance:textfield;';

  var inPed = document.createElement('input');
  inPed.type = 'number'; inPed.inputMode = 'numeric'; inPed.placeholder = '0';
  inPed.style.cssText = 'width:100%;border:1.5px solid #e2e8f0;border-radius:6px;padding:5px 2px;font-size:11px;font-weight:700;text-align:center;background:#f8fafc;-moz-appearance:textfield;';

  var btnDel = document.createElement('button');
  btnDel.textContent = '✕';
  btnDel.style.cssText = 'background:none;border:none;color:#94a3b8;font-size:14px;cursor:pointer;padding:2px;';
  btnDel.onclick = function() {
    delete values[key];
    updateCount();
    row.remove();
  };

  function syncNovo() {
    var nome  = inNome.value.trim();
    var marca = inMarca.value.trim();
    var est   = inEst.value;
    var ped   = inPed.value;
    inEst.style.borderColor = est !== '' ? '#22c55e' : '#e2e8f0';
    inEst.style.color       = est !== '' ? '#15803d' : '';
    inEst.style.background  = est !== '' ? '#f0fdf4' : '#f8fafc';
    inPed.style.borderColor = ped !== '' ? '#e63946' : '#e2e8f0';
    inPed.style.color       = ped !== '' ? '#b91c1c' : '';
    inPed.style.background  = ped !== '' ? '#fff1f2' : '#f8fafc';
    if (nome || est !== '' || ped !== '') {
      values[key] = {
        tab: 'NOVOS PRODUTOS', group: (marca || 'Sem marca'),
        name: nome || '(sem nome)', qtdCx: null, eng: null,
        estCx: '', estAvul: est, estTot: est !== '' ? parseInt(est,10)||0 : '',
        pedCx: '', pedAvul: ped, pedTot: ped !== '' ? parseInt(ped,10)||0 : ''
      };
    } else { delete values[key]; }
    updateCount();
  }

  inNome.addEventListener('input',  syncNovo);
  inMarca.addEventListener('input', syncNovo);
  inEst.addEventListener('input',   syncNovo);
  inPed.addEventListener('input',   syncNovo);

  row.appendChild(inNome);
  row.appendChild(inMarca);
  row.appendChild(inEst);
  row.appendChild(inPed);
  row.appendChild(btnDel);
  body.appendChild(row);
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t) { if (t.textContent === tab) t.classList.add('active'); });
  document.getElementById('sec-' + tab).classList.add('active');
}

function openModal() {
  var loja = document.getElementById('loja').value.trim();
  var resp = document.getElementById('responsavel').value.trim() || '-';
  var dt   = document.getElementById('data').value;
  var warn = document.getElementById('modal-warn');

  document.getElementById('modal-sub').textContent =
    'Loja: ' + (loja || '–') + '  |  Resp.: ' + resp + '  |  Data: ' + fmtDate(dt);

  warn.style.display = loja ? 'none' : 'block';

  var body = document.getElementById('modal-body');
  body.innerHTML = '';
  var entries = Object.values(values);

  if (entries.length === 0) {
    body.innerHTML = '<div class="empty-msg">Nenhum item preenchido ainda.</div>';
  } else {
    var grouped = {};
    entries.forEach(function(e) {
      if (!grouped[e.tab]) grouped[e.tab] = {};
      if (!grouped[e.tab][e.group]) grouped[e.tab][e.group] = [];
      grouped[e.tab][e.group].push(e);
    });
    Object.keys(grouped).forEach(function(tabKey) {
      var tabHdr = document.createElement('div');
      tabHdr.style.cssText = 'background:#1a1a2e;color:#fff;font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;padding:6px 10px;border-radius:8px;margin:10px 0 4px;';
      tabHdr.textContent = tabKey;
      body.appendChild(tabHdr);
      Object.keys(grouped[tabKey]).forEach(function(grpKey) {
        var grpHdr = document.createElement('div');
        grpHdr.style.cssText = 'background:#e2e8f0;color:#475569;font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:4px 10px;margin-bottom:2px;border-radius:4px;';
        grpHdr.textContent = grpKey;
        body.appendChild(grpHdr);
        var tbl = document.createElement('table');
        tbl.className = 'modal-tbl';
        tbl.style.marginBottom = '6px';
        tbl.innerHTML =
          '<thead><tr><th>Produto</th>' +
          '<th class="th-est">Est.cx</th><th class="th-est">+unit</th><th class="th-est">Total</th>' +
          '<th class="th-ped">Ped.cx</th><th class="th-ped">+unit</th><th class="th-ped">Total</th>' +
          '</tr></thead><tbody></tbody>';
        var tbody = tbl.querySelector('tbody');
        grouped[tabKey][grpKey].forEach(function(e) {
          var tr = document.createElement('tr');
          tr.innerHTML =
            '<td>' + e.name + '</td>' +
            '<td class="td-est">'     + (e.estCx   || '-') + '</td>' +
            '<td class="td-est">'     + (e.estAvul || '-') + '</td>' +
            '<td class="td-tot-est">' + (e.estTot !== '' ? e.estTot : '-') + '</td>' +
            '<td class="td-ped">'     + (e.pedCx   || '-') + '</td>' +
            '<td class="td-ped">'     + (e.pedAvul || '-') + '</td>' +
            '<td class="td-tot-ped">' + (e.pedTot !== '' ? e.pedTot : '-') + '</td>';
          tbody.appendChild(tr);
        });
        body.appendChild(tbl);
      });
    });
  }

  document.getElementById('modal-overlay').classList.add('open');
}

function baixarArquivo(formato) {
  var loja = document.getElementById('loja').value.trim();
  var resp = document.getElementById('responsavel').value.trim() || '-';
  var dt   = document.getElementById('data').value;
  var entries = Object.values(values);

  if (!loja) {
    document.getElementById('modal-warn').style.display = 'block';
    return;
  }
  if (entries.length === 0) return;

  // Monta conteúdo texto
  var linhas = [];
  linhas.push('FINAMORE – ESTOQUE E PEDIDO');
  linhas.push('Loja: ' + loja);
  linhas.push('Responsável: ' + resp);
  linhas.push('Data: ' + fmtDate(dt));
  linhas.push('');
  linhas.push('PRODUTO                          | EST.CX | +UNIT | TOT.EST | PED.CX | +UNIT | TOT.PED');
  linhas.push('─'.repeat(95));

  var grouped2 = {};
  entries.forEach(function(e) {
    if (!grouped2[e.tab]) grouped2[e.tab] = {};
    if (!grouped2[e.tab][e.group]) grouped2[e.tab][e.group] = [];
    grouped2[e.tab][e.group].push(e);
  });
  Object.keys(grouped2).forEach(function(tabKey) {
    linhas.push('');
    linhas.push('=== ' + tabKey.toUpperCase() + ' ===');
    Object.keys(grouped2[tabKey]).forEach(function(grpKey) {
      linhas.push('--- ' + grpKey + ' ---');
      grouped2[tabKey][grpKey].forEach(function(e) {
        var nome = e.name.padEnd(32).substring(0,32);
        var ec = (e.estCx   || '-').toString().padStart(6);
        var ea = (e.estAvul || '-').toString().padStart(5);
        var et = (e.estTot !== '' ? e.estTot : '-').toString().padStart(7);
        var pc = (e.pedCx   || '-').toString().padStart(6);
        var pa = (e.pedAvul || '-').toString().padStart(5);
        var pt = (e.pedTot !== '' ? e.pedTot : '-').toString().padStart(7);
        linhas.push(nome + ' | ' + ec + ' | ' + ea + ' | ' + et + ' | ' + pc + ' | ' + pa + ' | ' + pt);
      });
    });
  });

  linhas.push('');
  linhas.push('Total de itens: ' + entries.length);

  var nomeBase = 'Finamore_' + loja.replace(/\s+/g,'_') + '_' + (dt || new Date().toISOString().split('T')[0]);

  if (formato === 'txt') {
    var conteudo = linhas.join('\n');
    var blob = new Blob([conteudo], { type: 'text/plain;charset=utf-8' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href = url; a.download = nomeBase + '.txt';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);

  } else {
    // Gera HTML formatado
    var htmlLinhas = [];
    htmlLinhas.push('<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">');
    htmlLinhas.push('<meta name="viewport" content="width=device-width,initial-scale=1">');
    htmlLinhas.push('<title>Finamore - ' + loja + '</title>');
    htmlLinhas.push('<style>');
    htmlLinhas.push('body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f0f4f8;color:#1a1a2e;padding:12px;font-size:13px}');
    htmlLinhas.push('.cabecalho{background:#1a1a2e;color:#fff;border-radius:10px;padding:12px 14px;margin-bottom:12px}');
    htmlLinhas.push('.cabecalho h1{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}');
    htmlLinhas.push('.cabecalho h1 span{color:#e63946}');
    htmlLinhas.push('.cabecalho p{font-size:11px;color:rgba(255,255,255,.7);margin-top:4px}');
    htmlLinhas.push('.tab-hdr{background:#1a1a2e;color:#fff;font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;padding:6px 10px;border-radius:8px;margin:12px 0 4px}');
    htmlLinhas.push('.grp-hdr{background:#e2e8f0;color:#475569;font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:4px 10px;margin-bottom:2px;border-radius:4px}');
    htmlLinhas.push('table{width:100%;border-collapse:collapse;margin-bottom:6px;font-size:11px}');
    htmlLinhas.push('th{font-size:8px;font-weight:700;text-transform:uppercase;padding:5px 3px;border-bottom:2px solid #e2e8f0;text-align:center;background:#f8fafc}');
    htmlLinhas.push('th:first-child{text-align:left}');
    htmlLinhas.push('td{padding:5px 3px;border-bottom:1px solid #f1f5f9;text-align:center;vertical-align:middle}');
    htmlLinhas.push('td:first-child{text-align:left;font-weight:500}');
    htmlLinhas.push('.th-est{color:#16a34a}.th-ped{color:#dc2626}');
    htmlLinhas.push('.td-est{color:#15803d;font-weight:700}.td-ped{color:#b91c1c;font-weight:700}');
    htmlLinhas.push('.td-tot-est{color:#14532d;font-weight:800;background:#dcfce7;border-radius:4px;padding:4px 3px}');
    htmlLinhas.push('.td-tot-ped{color:#7f1d1d;font-weight:800;background:#fecaca;border-radius:4px;padding:4px 3px}');
    htmlLinhas.push('.rodape{text-align:center;font-size:10px;color:#94a3b8;margin-top:16px}');
    htmlLinhas.push('</style></head><body>');
    htmlLinhas.push('<div class="cabecalho"><h1><span>FINAMORE</span> – Estoque e Pedido</h1>');
    htmlLinhas.push('<p>Loja: ' + loja + ' &nbsp;|&nbsp; Resp.: ' + resp + ' &nbsp;|&nbsp; Data: ' + fmtDate(dt) + '</p></div>');

    // Agrupa para HTML
    var grouped3 = {};
    Object.values(values).forEach(function(e) {
      if (!grouped3[e.tab]) grouped3[e.tab] = {};
      if (!grouped3[e.tab][e.group]) grouped3[e.tab][e.group] = [];
      grouped3[e.tab][e.group].push(e);
    });

    Object.keys(grouped3).forEach(function(tabKey) {
      htmlLinhas.push('<div class="tab-hdr">' + tabKey + '</div>');
      Object.keys(grouped3[tabKey]).forEach(function(grpKey) {
        htmlLinhas.push('<div class="grp-hdr">' + grpKey + '</div>');
        htmlLinhas.push('<table><thead><tr><th>Produto</th>');
        htmlLinhas.push('<th class="th-est">Est.cx</th><th class="th-est">+unit</th><th class="th-est">Total</th>');
        htmlLinhas.push('<th class="th-ped">Ped.cx</th><th class="th-ped">+unit</th><th class="th-ped">Total</th>');
        htmlLinhas.push('</tr></thead><tbody>');
        grouped3[tabKey][grpKey].forEach(function(e) {
          htmlLinhas.push('<tr>');
          htmlLinhas.push('<td>' + e.name + '</td>');
          htmlLinhas.push('<td class="td-est">'     + (e.estCx   || '-') + '</td>');
          htmlLinhas.push('<td class="td-est">'     + (e.estAvul || '-') + '</td>');
          htmlLinhas.push('<td class="td-tot-est">' + (e.estTot !== '' ? e.estTot : '-') + '</td>');
          htmlLinhas.push('<td class="td-ped">'     + (e.pedCx   || '-') + '</td>');
          htmlLinhas.push('<td class="td-ped">'     + (e.pedAvul || '-') + '</td>');
          htmlLinhas.push('<td class="td-tot-ped">' + (e.pedTot !== '' ? e.pedTot : '-') + '</td>');
          htmlLinhas.push('</tr>');
        });
        htmlLinhas.push('</tbody></table>');
      });
    });

    htmlLinhas.push('<div class="rodape">Total de itens: ' + Object.keys(values).length + '</div>');
    htmlLinhas.push('</body></html>');

    var conteudoHtml = htmlLinhas.join('\n');
    var blob2 = new Blob([conteudoHtml], { type: 'text/html;charset=utf-8' });
    var url2  = URL.createObjectURL(blob2);
    var a2    = document.createElement('a');
    a2.href = url2; a2.download = nomeBase + '.html';
    document.body.appendChild(a2); a2.click();
    document.body.removeChild(a2); URL.revokeObjectURL(url2);
  }
}

function closeModalOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

buildUI();
